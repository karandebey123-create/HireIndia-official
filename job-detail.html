<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Job Details — HireIndia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
:root{
  --cream:#FDF7EE;--cream2:#F5EAD8;--navy:#2C1A0E;
  --saffron:#C8441C;--saffron-light:#FBEADC;
  --green:#138808;--green-light:#E8F5E9;
  --blue:#1a56db;--blue-light:#EBF2FF;
  --gray:#7C6B5D;--gray-light:#F2E8DC;
  --border:#E8D5BF;--text:#2C1A0E;
  --card:#FFFFFF;--shadow:rgba(44,26,14,0.10);
  --red:#DC2626;--red-light:#FEE2E2;
}
[data-theme="dark"]{
  --cream:#0D1117;--cream2:#161B22;--navy:#0A1628;
  --text:#E6EDF3;--card:#1C2333;--border:#30363D;
  --gray:#9CA3AF;--gray-light:#21262D;--shadow:rgba(0,0,0,0.4);
  --saffron-light:#2D1008;--green-light:#0D2818;
  --blue-light:#0D1F3C;--red-light:#2D1010;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);height:56px;display:flex;align-items:center;padding:0 5%;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:white;text-decoration:none;}
.logo span{color:var(--saffron);}
.nav-right{display:flex;gap:0.7rem;align-items:center;}
.back-btn{color:rgba(255,255,255,0.7);font-size:0.82rem;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:color .2s;}
.back-btn:hover{color:var(--saffron);}
.dark-btn{background:rgba(255,255,255,0.1);border:none;color:white;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:0.9rem;}

/* PAGE WRAP */
.page{max-width:860px;margin:0 auto;padding:72px 5% 3rem;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--gray);margin-bottom:1.2rem;flex-wrap:wrap;}
.breadcrumb a{color:var(--saffron);text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}

/* HERO CARD */
.hero-card{background:var(--navy);border-radius:18px;overflow:hidden;margin-bottom:1.5rem;}
.hero-banner{width:100%;height:200px;object-fit:cover;display:block;}
.hero-body{padding:1.5rem;}
.badges{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.9rem;}
.badge{font-size:0.68rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:4px;letter-spacing:0.5px;}
.badge-urgent{background:var(--red-light);color:var(--red);}
.badge-closing{background:#FEF3C7;color:#92400E;}
.badge-new{background:var(--green-light);color:var(--green);}
.badge-soon{background:var(--blue-light);color:var(--blue);}
.badge-cat{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;color:white;line-height:1.2;margin-bottom:0.5rem;}
.hero-org{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:1.2rem;}

/* FACTS GRID */
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.7rem;margin-bottom:1.2rem;}
.fact-box{background:rgba(255,255,255,0.08);border-radius:10px;padding:0.75rem 1rem;}
.fact-box .label{font-size:0.62rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:0.3rem;}
.fact-box .value{font-size:0.9rem;font-weight:700;color:white;}
.fact-box .value.green{color:#4ade80;}
.fact-box .value.red{color:#fca5a5;}

/* COUNTDOWN */
.countdown-strip{background:var(--red-light);border:1px solid #fca5a5;border-radius:10px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.cd-label{font-size:0.75rem;color:var(--red);font-weight:700;}
.cd-timer{font-family:'DM Mono',monospace;font-weight:700;color:var(--red);font-size:1rem;}

/* APPLY BUTTON */
.apply-row{display:flex;gap:0.7rem;flex-wrap:wrap;}
.btn-apply-main{flex:1;min-width:180px;background:var(--saffron);color:white;border:none;padding:0.85rem 1.5rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
.btn-apply-main:hover{background:#a8360f;transform:translateY(-1px);}
.btn-share-main{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:0.85rem 1.2rem;border-radius:10px;font-size:1rem;cursor:pointer;transition:all .2s;}
.btn-share-main:hover{background:rgba(255,255,255,0.2);}

/* SECTIONS */
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.section-head{background:var(--navy);padding:0.9rem 1.2rem;display:flex;align-items:center;gap:0.6rem;}
.section-head-title{font-family:'Playfair Display',serif;font-weight:800;font-size:0.95rem;color:white;}
.section-body{padding:1.2rem;}

/* OVERVIEW */
.overview-text{font-size:0.88rem;line-height:1.75;color:var(--text);}

/* TABLE */
.detail-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.detail-table th{background:var(--navy);color:white;padding:0.6rem 0.9rem;text-align:left;font-size:0.75rem;font-weight:600;}
.detail-table td{padding:0.55rem 0.9rem;border-bottom:1px solid var(--border);color:var(--text);}
.detail-table tr:nth-child(even) td{background:var(--gray-light);}
.detail-table .total td{font-weight:700;background:var(--saffron-light);color:var(--saffron);}

/* STEPS */
.steps-list{display:flex;flex-wrap:wrap;gap:0.5rem;}
.step-item{display:flex;align-items:center;gap:0.5rem;background:var(--gray-light);border-radius:8px;padding:0.55rem 0.9rem;font-size:0.8rem;font-weight:600;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--saffron);color:white;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;}

/* DATES */
.dates-list{display:flex;flex-direction:column;gap:0;}
.date-row{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:0.83rem;}
.date-row:last-child{border-bottom:none;}
.date-event{color:var(--text);font-weight:500;}
.date-val{font-weight:700;color:var(--red);}

/* IMPORTANT BOX */
.notice-box{background:var(--blue-light);border-left:4px solid var(--blue);border-radius:8px;padding:1rem;font-size:0.82rem;line-height:1.7;color:var(--text);}
.notice-box a{color:var(--blue);font-weight:600;}

/* NO EXTERNAL BANNER */
.ext-banner{background:linear-gradient(135deg,var(--navy),#3D2515);border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:1rem;}
.ext-banner h3{font-family:'Playfair Display',serif;color:white;font-size:1.05rem;margin-bottom:0.4rem;}
.ext-banner p{color:rgba(255,255,255,0.55);font-size:0.8rem;margin-bottom:1.1rem;}

/* RELATED */
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.8rem;}
.related-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:1rem;text-decoration:none;display:block;transition:all .2s;}
.related-card:hover{border-color:var(--saffron);transform:translateY(-2px);box-shadow:0 8px 20px var(--shadow);}
.related-cat{font-size:0.65rem;font-weight:700;color:var(--saffron);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.3rem;}
.related-title{font-family:'Playfair Display',serif;font-weight:800;font-size:0.85rem;color:var(--text);line-height:1.3;margin-bottom:0.4rem;}
.related-meta{font-size:0.72rem;color:var(--gray);}
.related-salary{font-size:0.78rem;font-weight:700;color:var(--green);margin-top:0.3rem;}

/* LOADING / ERROR */
.state-box{padding:4rem 2rem;text-align:center;}
.state-box .icon{font-size:3rem;margin-bottom:1rem;}
.state-box h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:0.5rem;}
.state-box p{color:var(--gray);font-size:0.88rem;}

/* WA FLOAT */
.wa-float{position:fixed;bottom:1.5rem;right:1.5rem;background:#25D366;color:white;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;box-shadow:0 6px 20px rgba(37,211,102,0.4);z-index:999;transition:transform .2s;text-decoration:none;}
.wa-float:hover{transform:scale(1.1);}

/* FOOTER */
footer{background:var(--navy);color:rgba(255,255,255,0.5);padding:2rem 5%;margin-top:2rem;}
.footer-inner{max-width:860px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:white;}
.footer-logo span{color:var(--saffron);}
.footer-links{display:flex;gap:1.2rem;flex-wrap:wrap;}
.footer-links a{color:rgba(255,255,255,0.4);font-size:0.75rem;text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:var(--saffron);}

@media(max-width:600px){
  .facts-grid{grid-template-columns:1fr 1fr;}
  .steps-list{flex-direction:column;}
  .step-item{width:100%;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="logo" href="index.html">Hire<span>India</span></a>
  <div class="nav-right">
    <a class="back-btn" href="index.html">← All Jobs</a>
    <button class="dark-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
  </div>
</nav>

<!-- CONTENT -->
<div class="page" id="content">
  <div class="state-box">
    <div class="icon">⏳</div>
    <h2>Loading Job Details…</h2>
    <p>Fetching from jobs.json</p>
  </div>
</div>

<a class="wa-float" href="https://wa.me/" target="_blank" rel="noopener">💬</a>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">Hire<span>India</span></div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy-policy.html">Privacy</a>
      <a href="disclaimer.html">Disclaimer</a>
    </div>
    <div style="font-size:0.72rem;">© 2026 HireIndia</div>
  </div>
</footer>

<script>
// ── DARK MODE ──────────────────────────────────────────────────────────────
function toggleDark(){
  const d = document.documentElement;
  const on = d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme', on?'':'dark');
  document.getElementById('dark-btn').textContent = on?'🌙':'☀️';
  localStorage.setItem('theme', on?'light':'dark');
}
if(localStorage.getItem('theme')==='dark'){
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('dark-btn').textContent='☀️';
}

// ── COUNTDOWN ──────────────────────────────────────────────────────────────
function startCountdown(id, raw){
  const el = document.getElementById('cd-' + id);
  if(!el) return;
  function tick(){
    const diff = new Date(raw) - new Date();
    if(diff <= 0){ el.querySelector('.cd-timer').textContent = 'Closed'; return; }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000),
          m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    el.querySelector('.cd-timer').textContent = `${d}d ${h}h ${m}m ${s}s`;
    setTimeout(tick,1000);
  }
  tick();
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function isExternal(url){ return url && (url.startsWith('http://') || url.startsWith('https://')); }

function badgeClass(b){
  if(b==='urgent') return 'badge-urgent';
  if(b==='closing') return 'badge-closing';
  if(b==='new') return 'badge-new';
  if(b==='soon') return 'badge-soon';
  return 'badge-new';
}

function share(j){
  if(navigator.share){
    navigator.share({title:j.title, url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied! 📋'));
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(j, allJobs){
  const isExt = isExternal(j.detailPage);
  const applyUrl = j.detailPage || '#';
  const applyLabel = isExt ? '📄 Official Details / Apply →' : '📄 View Full Article →';

  // Banner
  const bannerHtml = j.banner
    ? `<img class="hero-banner" src="${j.banner}" alt="${j.title}" onerror="this.style.display='none'"/>`
    : '';

  // Countdown
  const cdHtml = j.countdown && j.lastDateRaw
    ? `<div class="countdown-strip" id="cd-${j.id}"><span class="cd-label">⏱ Application closes in</span><span class="cd-timer">–</span></div>`
    : '';

  // Overview (optional field)
  const overviewHtml = j.overview
    ? `<div class="section"><div class="section-head"><span>📋</span><span class="section-head-title">About This Recruitment</span></div><div class="section-body"><p class="overview-text">${j.overview}</p></div></div>`
    : '';

  // Vacancy breakdown (optional: j.vacancyBreakdown = [{post,count,qualification}])
  const vacHtml = j.vacancyBreakdown && j.vacancyBreakdown.length
    ? `<div class="section"><div class="section-head"><span>📊</span><span class="section-head-title">Vacancy Breakdown</span></div><div class="section-body">
        <table class="detail-table"><thead><tr><th>Post Name</th><th>Vacancies</th><th>Qualification</th></tr></thead><tbody>
        ${j.vacancyBreakdown.map(v=>`<tr ${v.isTotal?'class="total"':''}><td>${v.post}</td><td>${v.count}</td><td>${v.qualification||'—'}</td></tr>`).join('')}
        </tbody></table></div></div>`
    : '';

  // Selection process (optional: j.selectionProcess = ["Written Test","Physical Test","Medical","Document Verification"])
  const selHtml = j.selectionProcess && j.selectionProcess.length
    ? `<div class="section"><div class="section-head"><span>🏆</span><span class="section-head-title">Selection Process</span></div><div class="section-body">
        <div class="steps-list">${j.selectionProcess.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div>${s}</div>`).join('')}</div>
        </div></div>`
    : '';

  // Important dates (optional: j.importantDates = [{event, date}])
  const datesHtml = j.importantDates && j.importantDates.length
    ? `<div class="section"><div class="section-head"><span>📅</span><span class="section-head-title">Important Dates</span></div><div class="section-body">
        <div class="dates-list">${j.importantDates.map(d=>`<div class="date-row"><span class="date-event">${d.event}</span><span class="date-val">${d.date}</span></div>`).join('')}</div>
        </div></div>`
    : '';

  // Pay details (optional: j.payDetails = "Pay Level 10 under 7th CPC…")
  const payHtml = j.payDetails
    ? `<div class="section"><div class="section-head"><span>💰</span><span class="section-head-title">Salary & Pay Details</span></div><div class="section-body"><p class="overview-text">${j.payDetails}</p></div></div>`
    : '';

  // How to apply (optional: j.howToApply = ["Visit official site","Register","Fill form","Upload documents","Pay fee","Submit"])
  const howHtml = j.howToApply && j.howToApply.length
    ? `<div class="section"><div class="section-head"><span>📝</span><span class="section-head-title">How to Apply</span></div><div class="section-body">
        <div class="steps-list">${j.howToApply.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div>${s}</div>`).join('')}</div>
        </div></div>`
    : '';

  // External notice banner (shown when detailPage is external)
  const extNotice = isExt
    ? `<div class="ext-banner"><h3>📄 Full Notification Available</h3><p>Complete details, syllabus, admit card and result updates are available on the official page.</p>
        <a class="btn-apply-main" href="${applyUrl}" target="_blank" rel="noopener" style="display:inline-flex;max-width:300px;margin:0 auto;">View Full Details / Apply →</a></div>`
    : '';

  // Related jobs (exclude self, show up to 4)
  const related = allJobs.filter(x => x.id !== j.id && !x.comingSoon).slice(0,4);
  const relatedHtml = related.length
    ? `<div class="section"><div class="section-head"><span>🔍</span><span class="section-head-title">Other Jobs You May Like</span></div><div class="section-body">
        <div class="related-grid">${related.map(r=>`
          <a class="related-card" href="job-detail.html?id=${r.id}">
            <div class="related-cat">${r.category}</div>
            <div class="related-title">${r.title}</div>
            <div class="related-meta">${r.vacancies} · ${r.org}</div>
            <div class="related-salary">${r.salary}</div>
          </a>`).join('')}
        </div></div></div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="breadcrumb">
      <a href="index.html">🏠 Home</a> › <a href="index.html#jobs-section">Jobs</a> › <span>${j.category}</span>
    </div>

    <div class="hero-card">
      ${bannerHtml}
      <div class="hero-body">
        <div class="badges">
          <span class="badge ${badgeClass(j.badge)}">${j.badgeText}</span>
          <span class="badge badge-cat">${j.category}</span>
        </div>
        <h1 class="hero-title">${j.title}</h1>
        <div class="hero-org">${j.emoji} ${j.org}</div>
        <div class="facts-grid">
          <div class="fact-box"><div class="label">Vacancies</div><div class="value">${j.vacancies}</div></div>
          <div class="fact-box"><div class="label">Salary</div><div class="value green">${j.salary}</div></div>
          <div class="fact-box"><div class="label">Age Limit</div><div class="value">${j.age}</div></div>
          <div class="fact-box"><div class="label">Qualification</div><div class="value">${j.qualification}</div></div>
          <div class="fact-box"><div class="label">Last Date</div><div class="value red">${j.lastDate}</div></div>
          ${j.examMode ? `<div class="fact-box"><div class="label">Exam Mode</div><div class="value">${j.examMode}</div></div>` : ''}
          ${j.applyFee ? `<div class="fact-box"><div class="label">Apply Fee</div><div class="value">${j.applyFee}</div></div>` : ''}
        </div>
        ${cdHtml}
        <div class="apply-row">
          ${applyUrl !== '#' ? `<a class="btn-apply-main" href="${applyUrl}" target="${isExt?'_blank':'_self'}" rel="${isExt?'noopener':''}">${applyLabel}</a>` : ''}
          <button class="btn-share-main" onclick="share(${JSON.stringify(j).replace(/</g,'\\u003c')})">📤</button>
        </div>
      </div>
    </div>

    ${overviewHtml}
    ${datesHtml}
    ${vacHtml}
    ${selHtml}
    ${payHtml}
    ${howHtml}
    ${extNotice}
    ${relatedHtml}
  `;

  // Start countdown after render
  if(j.countdown && j.lastDateRaw) startCountdown(j.id, j.lastDateRaw);

  // Update page title
  document.title = `${j.title} — HireIndia`;
}

// ── MAIN ──────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const jobId = parseInt(params.get('id'));

if(!jobId){
  document.getElementById('content').innerHTML = `<div class="state-box"><div class="icon">🔎</div><h2>No Job Selected</h2><p>Please go back and click on a job.</p><br/><a href="index.html" style="color:var(--saffron);font-weight:600;">← Back to All Jobs</a></div>`;
} else {
  fetch('jobs.json')
    .then(r => r.json())
    .then(data => {
      const job = data.jobs.find(j => j.id === jobId);
      if(!job){
        document.getElementById('content').innerHTML = `<div class="state-box"><div class="icon">❌</div><h2>Job Not Found</h2><p>This job may have been removed.</p><br/><a href="index.html" style="color:var(--saffron);font-weight:600;">← Back to All Jobs</a></div>`;
      } else {
        render(job, data.jobs);
      }
    })
    .catch(() => {
      document.getElementById('content').innerHTML = `<div class="state-box"><div class="icon">⚠️</div><h2>Could Not Load</h2><p>Make sure jobs.json is in the same folder.</p><br/><a href="index.html" style="color:var(--saffron);font-weight:600;">← Back to All Jobs</a></div>`;
    });
}
</script>
</body>
</html>
