<style>
:root{
  --cream:#FDF7EE;--cream2:#F5EAD8;
  --navy:#2C1A0E;--navy2:#3D2515;
  --saffron:#C8441C;--saffron-light:#FBEADC;
  --green:#138808;--green-light:#E8F5E9;
  --blue:#1a56db;--blue-light:#EBF2FF;
  --gray:#7C6B5D;--gray-light:#F2E8DC;
  --border:#E8D5BF;--text:#2C1A0E;
  --card:#FFFFFF;--shadow:rgba(44,26,14,0.10);
  --red:#DC2626;--red-light:#FEE2E2;
}
[data-theme="dark"]{
  --cream:#0D1117;--cream2:#161B22;--navy:#0A1628;--navy2:#152238;
  --text:#E6EDF3;--card:#1C2333;--border:#30363D;--gray:#9CA3AF;
  --gray-light:#21262D;--shadow:rgba(0,0,0,0.4);--saffron-light:#2D1008;
  --green-light:#0D2818;--blue-light:#0D1F3C;--red-light:#2D1010;
}
[data-theme="dark"] .state-section{background:#0A0F1E;}
[data-theme="dark"] .knowledge-section{background:#161B22;}
[data-theme="dark"] .know-card,[data-theme="dark"] .featured-card,[data-theme="dark"] .sidebar-card,[data-theme="dark"] .qual-card{background:#1C2333;border-color:#30363D;}
[data-theme="dark"] .know-card-title,[data-theme="dark"] .card-title,[data-theme="dark"] .quick-job-title,[data-theme="dark"] .cal-exam,[data-theme="dark"] .sec-title{color:#E6EDF3!important;}
[data-theme="dark"] .know-card-sub,[data-theme="dark"] .card-org,[data-theme="dark"] .quick-job-meta,[data-theme="dark"] .cal-type,[data-theme="dark"] .fact-label,[data-theme="dark"] .qual-count{color:#9CA3AF!important;}
[data-theme="dark"] .fact{background:#21262D;}
[data-theme="dark"] .fact-value{color:#E6EDF3!important;}
[data-theme="dark"] .filter-bar{background:#161B22;border-color:#30363D;}
[data-theme="dark"] .chip{background:#21262D;border-color:#30363D;color:#9CA3AF;}
[data-theme="dark"] .card-actions,[data-theme="dark"] .cal-item{border-color:#30363D;}
[data-theme="dark"] .fav-item{background:#21262D;}
[data-theme="dark"] .fav-item-title{color:#E6EDF3!important;}
[data-theme="dark"] .fav-item-org{color:#9CA3AF!important;}
[data-theme="dark"] footer{background:#0A0F1E;}
[data-theme="dark"] .cat-card{background:#1C2333;border-color:#30363D;color:#E6EDF3;}
[data-theme="dark"] .sec-head{border-color:#30363D;}
[data-theme="dark"] .qual-name{color:#E6EDF3!important;}
[data-theme="dark"] .mobile-menu{background:#0A1628;}
[data-theme="dark"] .mobile-menu a{color:#E6EDF3;border-color:#30363D;}
[data-theme="dark"] .bottom-nav{background:#0A1628;border-color:#1e2a3a;}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}

/* ── NAVBAR ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);padding:0 4%;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:white;letter-spacing:-0.5px;cursor:pointer;text-decoration:none;}
.logo span{color:var(--saffron);}
.nav-center{display:flex;gap:1.5rem;}
.nav-link{color:rgba(255,255,255,0.7);font-size:0.8rem;font-weight:500;cursor:pointer;transition:color .2s;text-decoration:none;}
.nav-link:hover{color:var(--saffron);}
.nav-right{display:flex;align-items:center;gap:0.6rem;}
.dark-btn{background:rgba(255,255,255,0.1);border:none;color:white;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.dark-btn:hover{background:rgba(255,255,255,0.2);}
.fav-nav-btn{background:rgba(200,68,28,0.15);border:1px solid rgba(200,68,28,0.3);color:var(--saffron);padding:0.4rem 0.9rem;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .2s;}
.fav-nav-btn:hover{background:var(--saffron);color:white;}
.post-btn{background:var(--saffron);border:none;color:white;padding:0.45rem 1rem;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;transition:all .2s;}
.post-btn:hover{background:#a8360f;}

/* hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border:none;background:rgba(255,255,255,0.1);border-radius:8px;}
.hamburger span{width:22px;height:2px;background:white;border-radius:2px;transition:all .3s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.nav-right-mobile{display:none;align-items:center;gap:0.5rem;}

/* ── MOBILE MENU ── */
.mobile-menu{position:fixed;top:56px;left:0;right:0;background:var(--navy);z-index:999;transform:translateY(-110%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.mobile-menu.open{transform:translateY(0);}
.mobile-menu a{display:block;color:rgba(255,255,255,0.85);font-size:0.95rem;font-weight:500;padding:0.95rem 5%;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer;text-decoration:none;transition:all .2s;}
.mobile-menu a:hover{color:var(--saffron);padding-left:7%;}
.mobile-menu-actions{display:flex;gap:0.6rem;padding:1rem 5%;}
.mob-fav-btn{flex:1;padding:0.7rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;background:rgba(200,68,28,0.2);color:var(--saffron);border:1px solid rgba(200,68,28,0.3);}
.mob-post-btn{flex:1;padding:0.7rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;background:var(--saffron);color:white;border:none;}

/* ── TICKER ── */
.ticker-bar{background:var(--saffron);margin-top:56px;padding:0.45rem 0;overflow:hidden;}
.ticker-inner{display:flex;align-items:center;padding:0 4%;}
.ticker-label{background:var(--navy);color:white;font-size:0.68rem;font-weight:700;padding:0.18rem 0.7rem;letter-spacing:1px;white-space:nowrap;margin-right:1rem;border-radius:3px;}
.ticker-scroll{overflow:hidden;flex:1;}
.ticker-text{display:inline-block;animation:ticker 40s linear infinite;white-space:nowrap;}
.ticker-text span{color:white;font-size:0.76rem;font-weight:500;margin-right:3rem;}
.ticker-text span::before{content:'● ';}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ── HERO (shorter) ── */
.hero{background:var(--navy);padding:2rem 5% 1.8rem;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,68,28,0.15) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;}
.hero-logo{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7vw,4rem);font-weight:900;color:white;position:relative;z-index:1;line-height:1;margin-bottom:0.35rem;letter-spacing:-2px;}
.hero-logo span{color:var(--saffron);}
.hero-tagline{font-size:0.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:0.9rem;position:relative;z-index:1;}
.hero-sub{color:rgba(255,255,255,0.65);font-size:0.88rem;max-width:400px;margin:0 auto 1.2rem;line-height:1.5;position:relative;z-index:1;}
.search-wrap{display:flex;gap:0.4rem;max-width:560px;margin:0 auto 1rem;background:white;border-radius:12px;padding:0.4rem;box-shadow:0 8px 40px rgba(0,0,0,0.35);position:relative;z-index:1;}
.search-input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);background:transparent;padding:0.3rem 0.5rem;}
.search-wrap select{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.76rem;color:var(--gray);background:var(--gray-light);border-radius:8px;padding:0.3rem 0.5rem;cursor:pointer;}
.search-btn{background:var(--saffron);color:white;border:none;padding:0.55rem 1rem;border-radius:8px;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.search-btn:active{transform:scale(0.95);}
.hero-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:0.35rem;position:relative;z-index:1;}
.hero-chip{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);padding:0.28rem 0.75rem;border-radius:20px;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all .2s;}
.hero-chip:hover,.hero-chip:active{background:var(--saffron);border-color:var(--saffron);color:white;transform:scale(0.97);}

/* ── CATEGORIES ── */
.cat-section{background:var(--cream2);padding:1.2rem 4%;}
.cat-section-inner{max-width:1200px;margin:0 auto;}
.cat-section-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:var(--text);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.cat-section-title::before{content:'';width:4px;height:16px;background:var(--saffron);border-radius:2px;display:inline-block;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.55rem;}
.cat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:0.75rem 0.5rem;text-align:center;cursor:pointer;font-size:0.76rem;font-weight:600;color:var(--text);user-select:none;
  transition:transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease,background 0.18s ease,color 0.18s ease;}
.cat-card:hover{border-color:var(--saffron);background:var(--saffron-light);color:var(--saffron);transform:translateY(-3px);box-shadow:0 8px 20px var(--shadow);}
.cat-card:active{transform:scale(0.93) translateY(0);box-shadow:none;background:var(--saffron);color:white;border-color:var(--saffron);}
.cat-icon{font-size:1.35rem;display:block;margin-bottom:0.3rem;}

/* ── FILTER BAR ── */
.filter-bar{background:white;border-bottom:1px solid var(--border);padding:0.55rem 4%;display:flex;gap:0.4rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:sticky;top:56px;z-index:100;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{background:var(--gray-light);border:1.5px solid var(--border);color:var(--gray);padding:0.28rem 0.8rem;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none;
  transition:transform 0.15s ease,background 0.15s,border-color 0.15s,color 0.15s;}
.chip:hover{border-color:var(--saffron);color:var(--saffron);}
.chip:active{transform:scale(0.93);}
.chip.active{background:var(--saffron);border-color:var(--saffron);color:white;}

/* ── MAIN LAYOUT ── */
.main-wrap{display:grid;grid-template-columns:1fr 310px;gap:1.5rem;max-width:1200px;margin:0 auto;padding:1.4rem 4%;}

/* ── SECTION HEADERS ── */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;padding-bottom:0.7rem;border-bottom:2px solid var(--border);}
.sec-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:0.5rem;}
.sec-title::before{content:'';width:4px;height:18px;background:var(--saffron);border-radius:2px;display:inline-block;}
.see-all{color:var(--saffron);font-size:0.78rem;font-weight:600;cursor:pointer;text-decoration:none;}

/* ── JOB CARDS ── */
.featured-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;cursor:pointer;box-shadow:0 2px 12px var(--shadow);
  transition:transform 0.25s ease,box-shadow 0.25s ease,border-color 0.25s ease;}
.featured-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px var(--shadow);border-color:var(--saffron);}
.featured-card:active{transform:scale(0.99);}
.card-img-wrap{width:100%;height:165px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.card-emoji{font-size:3.2rem;position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(44,26,14,0.55),transparent);z-index:2;}
.card-body{padding:1rem;}
.card-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap;}
.card-category{font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--saffron);}
.card-dot{color:var(--border);}
.card-org{font-size:0.7rem;color:var(--gray);font-weight:500;}
.badge{font-size:0.62rem;font-weight:700;padding:0.18rem 0.5rem;border-radius:4px;margin-left:auto;}
.badge-urgent{background:var(--red-light);color:var(--red);}
.badge-state{background:var(--green-light);color:var(--green);}
.badge-central{background:var(--blue-light);color:var(--blue);}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:var(--text);margin-bottom:0.75rem;line-height:1.3;}
.quick-facts{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:0.85rem;}
.fact{background:var(--gray-light);border-radius:8px;padding:0.5rem 0.7rem;}
.fact-label{font-size:0.62rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--gray);margin-bottom:0.12rem;}
.fact-value{font-size:0.78rem;font-weight:600;color:var(--text);}
.fact-value.salary{color:var(--green);}
.fact-value.urgent{color:var(--red);}
.countdown-strip{background:var(--red-light);border:1px solid #fca5a5;border-radius:8px;padding:0.5rem 0.8rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;flex-wrap:wrap;gap:0.3rem;}
.countdown-label{font-size:0.68rem;color:var(--red);font-weight:700;}
.countdown-time{font-family:'DM Mono',monospace;font-weight:700;color:var(--red);font-size:0.85rem;}
.card-actions{display:flex;gap:0.5rem;padding-top:0.85rem;border-top:1px solid var(--border);}
.btn-apply{flex:1;background:var(--saffron);color:white;border:none;padding:0.62rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.btn-apply:hover{background:#a8360f;}
.btn-apply:active{transform:scale(0.96);}
.btn-save{background:var(--gray-light);border:1.5px solid var(--border);color:var(--text);padding:0.62rem 0.85rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:var(--red-light);border-color:#fca5a5;}
.btn-save:active{transform:scale(0.93);}
.btn-save.saved{background:var(--red-light);border-color:#ef4444;color:var(--red);}
.btn-share{background:var(--gray-light);border:1.5px solid var(--border);color:var(--text);padding:0.62rem 0.8rem;border-radius:8px;cursor:pointer;transition:all .2s;font-size:0.85rem;}
.btn-share:active{transform:scale(0.93);}

/* ── SIDEBAR ── */
.sidebar-sticky{position:sticky;top:70px;}
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;}
.sidebar-title{font-family:'Playfair Display',serif;font-size:0.92rem;font-weight:800;color:var(--text);margin-bottom:0.9rem;padding-bottom:0.55rem;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:0.4rem;}
.quick-job{display:flex;gap:0.7rem;padding:0.7rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s;text-decoration:none;color:inherit;}
.quick-job:last-child{border-bottom:none;padding-bottom:0;}
.quick-job:hover{opacity:0.72;}
.quick-job-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--gray-light);}
.quick-job-title{font-weight:600;font-size:0.78rem;color:var(--text);margin-bottom:0.18rem;}
.quick-job-meta{font-size:0.66rem;color:var(--gray);}
.quick-job-salary{font-size:0.68rem;font-weight:700;color:var(--green);margin-top:0.12rem;}
.cal-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0;border-bottom:1px solid var(--border);}
.cal-item:last-child{border-bottom:none;}
.cal-date{background:var(--navy);color:white;border-radius:8px;padding:0.35rem 0.5rem;text-align:center;min-width:40px;}
.cal-day{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;display:block;}
.cal-month{font-size:0.56rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;opacity:0.7;}
.cal-exam{font-size:0.74rem;font-weight:600;color:var(--text);}
.cal-type{font-size:0.65rem;color:var(--gray);margin-top:0.08rem;}
.alert-box{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:12px;padding:1.1rem;text-align:center;}
.alert-icon{font-size:1.7rem;margin-bottom:0.45rem;display:block;}
.alert-title{font-family:'Playfair Display',serif;color:white;font-size:0.92rem;font-weight:800;margin-bottom:0.35rem;}
.alert-sub{color:rgba(255,255,255,0.6);font-size:0.73rem;margin-bottom:0.9rem;line-height:1.5;}
.btn-whatsapp{background:#25D366;color:white;border:none;width:100%;padding:0.6rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.78rem;cursor:pointer;margin-bottom:0.45rem;transition:all .2s;}
.btn-whatsapp:hover{background:#128C7E;}
.btn-telegram{background:#0088cc;color:white;border:none;width:100%;padding:0.6rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.78rem;cursor:pointer;transition:all .2s;}
.btn-telegram:hover{background:#006699;}

/* ── QUAL SECTION ── */
.qual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.65rem;margin-bottom:2rem;}
.qual-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:0.85rem;text-align:center;cursor:pointer;transition:all .2s;}
.qual-card:hover{border-color:var(--saffron);transform:translateY(-2px);box-shadow:0 8px 20px var(--shadow);}
.qual-card:active{transform:scale(0.95);}
.qual-icon{font-size:1.6rem;display:block;margin-bottom:0.4rem;}
.qual-name{font-weight:700;font-size:0.76rem;color:var(--text);}
.qual-count{font-size:0.66rem;color:var(--gray);margin-top:0.18rem;}

/* ── STATE ── */
.state-section{background:var(--navy);padding:1.8rem 4%;margin-top:2rem;}
.state-sec-title{font-family:'Playfair Display',serif;color:white;font-size:1.3rem;font-weight:800;margin-bottom:1.1rem;}

/* ── KNOWLEDGE ── */
.knowledge-section{padding:1.8rem 4%;background:var(--cream2);}
.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.9rem;max-width:1200px;margin:0 auto;}
.know-card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:all .25s
