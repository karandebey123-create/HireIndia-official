function buildJobCard(j){
  const imgHtml = j.banner
    ? `<img alt="${j.title}" loading="lazy" src="${j.banner}" onerror="this.style.display='none'"/>`
    : "";
  const cdHtml = j.countdown && j.lastDateRaw
    ? `<div class="countdown-strip" id="cd-${j.id}"></div>`
    : "";
  const fact3Label = j.age ? "Age Limit" : "Qualification";
  const fact3Val = j.age || j.qualification || "—";
  const fact4Label = j.countdown ? (j.id===2?"Exam Date":"Last Date") : "Last Date";
  const actionsHtml = j.comingSoon
    ? `<button class="btn-apply" disabled style="opacity:0.6;cursor:not-allowed;">🔜 Details Coming Soon</button>`
    : `<a class="btn-apply" href="job-detail.html?id=${j.id}">📄 View Full Details →</a>
       <button class="btn-save" id="save-${j.id}" onclick="toggleSave(${j.id},\'${j.title}\',\'${j.org}\',\'${j.salary}\',this)">🤍 Save</button>
       <button class="btn-share" onclick="shareJob(${j.id})">📤</button>`;
  const comingSoonBox = j.comingSoon ? `<div style="background:var(--cream2);border:2px dashed var(--border);border-radius:10px;padding:1rem;text-align:center;margin:0.75rem 0;"><div style="font-size:1.3rem;margin-bottom:0.25rem;">📝</div><div style="font-weight:600;font-size:0.82rem;">Full Details Being Uploaded</div><div style="font-size:0.72rem;color:var(--gray);margin-top:0.2rem;">Coming very soon!</div></div>` : "";
  const opacity = j.comingSoon ? "style='opacity:0.75;'" : "";
  return `<div class="featured-card" data-type="${j.types}" data-id="${j.id}" ${opacity}>
    <div class="card-img-wrap" style="background:${j.bgGradient};">
      ${imgHtml}
      <span class="card-emoji">${j.emoji}</span><div class="card-overlay"></div>
    </div>
    <div class="card-body">
      <div class="card-meta"><span class="card-category">${j.category}</span><span class="card-dot">·</span><span class="card-org">${j.org}</span><span class="badge badge-${j.badge}">${j.badgeText}</span></div>
      <div class="card-title">${j.title}</div>
      ${!j.comingSoon ? `<div class="quick-facts">
        <div class="fact"><div class="fact-label">Total Vacancies</div><div class="fact-value">${j.vacancies}</div></div>
        <div class="fact"><div class="fact-label">Salary</div><div class="fact-value salary">${j.salary}</div></div>
        <div class="fact"><div class="fact-label">${fact3Label}</div><div class="fact-value">${fact3Val}</div></div>
        <div class="fact"><div class="fact-label">${fact4Label}</div><div class="fact-value urgent">${j.lastDate}</div></div>
      </div>${cdHtml}` : comingSoonBox}
      <div class="card-actions">${actionsHtml}</div>
    </div>
  </div>`;
}

function buildSidebar(d){

// ─── INIT ALL JS ───
function initAll(data){
  // countdowns
  data.jobs.filter(j=>j.countdown && j.lastDateRaw).forEach(j=>{
    setCD('cd-'+j.id, j.lastDateRaw);
  });
  // favs
  updateFavCount();
  favs.forEach(f=>{
    const b=document.getElementById('save-'+f.id);
    if(b){b.textContent='❤️ Saved';b.classList.add('saved');}
  });
  renderFavs();
  // outside click close menu
  document.addEventListener('click',e=>{
    const menu=document.getElementById('mobile-menu');
    const ham=document.getElementById('hamburger');
    if(menu && menu.classList.contains('open')&&!menu.contains(e.target)&&!ham.contains(e.target))closeMenu();
  });
}

// ─── FAVOURITES ───
let favs=JSON.parse(localStorage.getItem('hi-favs')||'[]');
function toggleSave(id,title,org,salary,btn){
  const i=favs.findIndex(f=>f.id===id);
  if(i===-1){favs.push({id,title,org,salary});btn.textContent='❤️ Saved';btn.classList.add('saved');toast('Saved! ❤️');}
  else{favs.splice(i,1);btn.textContent='🤍 Save';btn.classList.remove('saved');toast('Removed from saved');}
  localStorage.setItem('hi-favs',JSON.stringify(favs));updateFavCount();renderFavs();
}
function renderFavs(){
  const el=document.getElementById('fav-list');
  if(!el)return;
  if(!favs.length){el.innerHTML='<div class="fav-empty"><p style="font-size:1.8rem;margin-bottom:0.4rem;">🔍</p><p style="font-weight:600;font-size:0.88rem;">No saved jobs yet!</p><p style="font-size:0.76rem;margin-top:0.3rem;">Click 🤍 on any job to save it</p></div>';return;}
  el.innerHTML=favs.map(f=>`<div class="fav-item"><div class="fav-item-title">${f.title}</div><div class="fav-item-org">${f.org}</div><div class="fav-item-salary">${f.salary}</div><button class="fav-remove" onclick="removeFav(${f.id})">✕</button></div>`).join('');
}
function removeFav(id){favs=favs.filter(f=>f.id!==id);localStorage.setItem('hi-favs',JSON.stringify(favs));updateFavCount();const b=document.getElementById('save-'+id);if(b){b.textContent='🤍 Save';b.classList.remove('saved');}renderFavs();toast('Removed');}
function updateFavCount(){document.querySelectorAll('#fav-count,#fav-count-mob').forEach(e=>e.textContent=favs.length);}
function toggleFavPanel(){document.getElementById('fav-panel').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');renderFavs();}

// ─── DARK MODE ───
function toggleDark(){const dark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dark?'light':'dark');document.querySelectorAll('.dark-btn').forEach(b=>b.textContent=dark?'🌙':'☀️');toast(dark?'☀️ Light mode':'🌙 Dark mode');}

// ─── MENU ───
function toggleMenu(){document.getElementById('hamburger').classList.toggle('open');document.getElementById('mobile-menu').classList.toggle('open');}
function closeMenu(){document.getElementById('hamburger').classList.remove('open');document.getElementById('mobile-menu').classList.remove('open');}

// ─── FILTER ───
function filter(type,el){if(el){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');}document.querySelectorAll('.featured-card').forEach(c=>{const t=c.dataset.type||'';c.style.display=type==='all'||t.includes(type)?'block':'none';});}
function filterAndScroll(type){filter(type,null);goTo('jobs-section');}

// ─── SEARCH ───
function doSearch(){const q=document.getElementById('search-input').value.toLowerCase().trim();const cat=document.getElementById('search-cat').value;let found=0;document.querySelectorAll('.featured-card').forEach(c=>{const t=c.dataset.type||'';const match=(!q||c.innerText.toLowerCase().includes(q)||t.includes(q))&&(cat==='all'||t.includes(cat));c.style.display=match?'block':'none';if(match)found++;});document.getElementById('no-results-msg').style.display=q&&found===0?'block':'none';}

// ─── NAV ───
function goTo(id){closeMenu();const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}

// ─── TOAST ───
function toast(msg){const el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

// ─── SHARE ───
function shareJob(id){if(navigator.share){navigator.share({title:'HireIndia Job',url:window.location.href}).catch(()=>{});}else{toast('Link copied! 📲');}}

// ─── COUNTDOWN ───
function setCD(elId,deadline){const el=document.getElementById(elId);if(!el)return;function upd(){const d=new Date(deadline)-new Date();if(d<=0){el.innerHTML='<span class="countdown-label">⛔ Deadline Passed</span>';return;}const dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000);el.innerHTML=`<span class="countdown-label">⏰ Closes in:</span><span class="countdown-time">${dy}d ${h}h ${m}m</span>`;}upd();setInterval(upd,60000);}
</script>
